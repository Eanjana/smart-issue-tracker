<div class="dashboard" tabindex="0">
  <!-- Header -->
  <header class="dashboard__header">
    <div class="dashboard__header-left">
      <h1 class="dashboard__title">Dashboard</h1>
      <p class="dashboard__subtitle">Track and monitor all issues in real-time</p>
    </div>
  </header>

  <!-- Summary Cards -->
  <section class="dashboard__section" aria-label="Summary statistics">
    <app-summary-cards [cards]="summaryCards()" />
  </section>

  <!-- Content Grid: SLA + Charts -->
  <div class="dashboard__grid">
    <!-- SLA Metrics (left column) -->
    <section class="dashboard__section dashboard__section--sla">
      <app-sla-metrics [metrics]="slaMetrics()" />
    </section>

    <!-- Charts (right column) -->
    <section class="dashboard__section dashboard__section--charts" aria-label="Issue charts">
      <app-issue-chart [config]="chartByMonth()!" />
      <app-issue-chart [config]="chartByPriority()!" />
      <app-issue-chart [config]="chartByStatus()!" />
    </section>
  </div>
</div>
